{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="mb-4 text-primary">👨‍🌾 Register New Farmer</h3>
            
            <form method="post">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    
                    {% if field.help_text %}
                    <small class="form-text text-muted d-block">{{ field.help_text }}</small>
                    {% endif %}
                    
                    {% for error in field.errors %}
                    <div class="text-danger small">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}

                <button type="submit" class="btn btn-success w-100 py-2">Create Account</button>
            </form>

            <div class="mt-3 text-center">
                <a href="{% url 'admin_dashboard' %}" class="text-decoration-none">← Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var inputs = document.querySelectorAll('input, textarea, select');
        inputs.forEach(function(input) {
            input.classList.add('form-control');
        });
    });
</script>
{% endblock %}
