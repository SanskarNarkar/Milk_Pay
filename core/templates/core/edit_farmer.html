{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow">
            <h4 class="mb-3 text-primary">✏️ Edit Farmer Info</h4>
            <p class="text-muted">Updating profile for: <strong>{{ farmer.username }}</strong></p>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label>First Name</label>
                    {{ form.first_name }}
                </div>
                <div class="mb-3">
                    <label>Last Name</label>
                    {{ form.last_name }}
                </div>
                <div class="mb-3">
                    <label>Phone Number</label>
                    {{ form.phone }}
                    <small class="text-muted">Must include +91 for WhatsApp to work.</small>
                </div>
                <div class="mb-3">
                    <label>Address</label>
                    {{ form.address }}
                </div>

                <div class="d-flex gap-2">
                    <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary flex-grow-1">Cancel</a>
                    <button type="submit" class="btn btn-primary flex-grow-1">Update Details</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        var inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(function(input) {
            input.classList.add('form-control');
        });
    });
</script>
{% endblock %}
