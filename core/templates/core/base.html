<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilkPay System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #eaebec; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mobile-card { margin-bottom: 10px; border-left: 5px solid #0d6efd; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🥛 MilkPay</a>
          <!--   {% if user.is_authenticated %}
                <a href="{% url 'logout' %}" class="btn btn-sm btn-light text-primary">Logout</a>
            {% endif %} -->
            <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-light text-primary">
                         Logout
                 </button>
</form>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
